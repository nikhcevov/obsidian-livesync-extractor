services:
  couchdb:
    image: couchdb:3.3
    restart: unless-stopped
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-changeme}
      COUCHDB_SINGLE_NODE: "true"
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 10s
      timeout: 5s
      retries: 5

  livesync-publisher:
    build: .
    restart: unless-stopped
    depends_on:
      couchdb:
        condition: service_healthy
    environment:
      COUCHDB_URL: http://couchdb:5984
      COUCHDB_DB: ${COUCHDB_DB:-obsidian-livesync-v2}
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-changeme}
      COUCHDB_AUTO_CREATE: "true"
      SITE_BASE_URL: ${SITE_BASE_URL:-http://localhost:8080/}
      SITE_TITLE: ${SITE_TITLE:-Dev Blog}
      SITE_LANGUAGE: ${SITE_LANGUAGE:-en}
      PERMALINK_PATTERN: ${PERMALINK_PATTERN:-/blog/:slug/}
      DEBOUNCE_MS: ${DEBOUNCE_MS:-4000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - public_data:/public
      - state_data:/state

volumes:
  couchdb_data:
  public_data:
  state_data:
