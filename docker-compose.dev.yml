services:
  couchdb:
    image: couchdb:3.3
    restart: unless-stopped
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-changeme}
      COUCHDB_SINGLE_NODE: "true"
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 10s
      timeout: 5s
      retries: 5

  couchdb-seed:
    image: curlimages/curl:8.12.1
    restart: "no"
    depends_on:
      couchdb:
        condition: service_healthy
    environment:
      COUCHDB_URL: http://couchdb:5984
      COUCHDB_DB: ${COUCHDB_DB:-obsidian-livesync-v2}
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-changeme}
    volumes:
      - ./docker/dev/seed.sh:/seed.sh:ro
      - ./docker/dev/fixtures:/fixtures:ro
      - ./docker/dev/example.png:/assets/example.png:ro
    entrypoint: ["/bin/sh", "/seed.sh"]

  livesync-publisher:
    build: .
    restart: unless-stopped
    depends_on:
      couchdb:
        condition: service_healthy
      couchdb-seed:
        condition: service_completed_successfully
    environment:
      COUCHDB_URL: http://couchdb:5984
      COUCHDB_DB: ${COUCHDB_DB:-obsidian-livesync-v2}
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-changeme}
      COUCHDB_AUTO_CREATE: "true"
      DEBOUNCE_MS: ${DEBOUNCE_MS:-4000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ./dev/public:/public
      - ./dev/state:/state
      - ./dev/config:/config

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - livesync-publisher
    ports:
      - "8080:8080"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./dev/public:/public:ro

volumes:
  couchdb_data:
